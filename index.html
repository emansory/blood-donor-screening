            {id: "R132", category: "Vital Signs", question: "Pre", condition: "Pulse <50 or >100 or irregular", decision: "Defer", duration: "Until normalized", keywords: "pulse|heart rate|irregular"},
            
            // Hemoglobin/Hematocrit
            {id: "R133", category: "Lab Values", question: "Pre", condition: "Male Hgb <13 g/dL or Hct <39%", decision: "Defer", duration: "Until corrected", keywords: "hemoglobin|hematocrit|anemia male"},
            {id: "R134", category: "Lab Values", question: "Pre", condition: "Female Hgb <12.5 g/dL or Hct <38%", decision: "Defer", duration: "Until corrected", keywords: "hemoglobin|hematocrit|anemia female"},
            {id: "R135", category: "Lab Values", question: "Pre", condition: "Ferritin <30 ng/mL (frequent donor)", decision: "Defer", duration: "2 months + treatment", keywords: "ferritin|iron|frequent donor"},
            
            // Physical Exam
            {id: "R136", category: "Physical Exam", question: "Pre", condition: "Signs of IV drug use on arms", decision: "Permanent", duration: "Permanent", keywords: "track marks|IV drug signs|injection sites"},
            {id: "R137", category: "Physical Exam", question: "Pre", condition: "Skin infection at venipuncture site", decision: "Defer", duration: "Until healed", keywords: "arm infection|venipuncture site"}
        ];

        // Main Application Component
        function BloodDonorScreeningApp() {
            const [activeTab, setActiveTab] = useState('questionnaire');
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [answers, setAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);
            const [deferralReason, setDeferralReason] = useState('');
            const [calculatorInput, setCalculatorInput] = useState('');
            const [calculatorResult, setCalculatorResult] = useState('');

            // Categories for filtering
            const categories = ['All', ...new Set(COMPLETE_RULES_DATABASE.map(r => r.category))];

            // DHQ Questions
            const dhqQuestions = [
                {id: 1, text: "Are you feeling healthy and well to donate blood today?", category: "General Health"},
                {id: 2, text: "Have you read the blood donor educational materials today?", category: "Education"},
                {id: 3, text: "Have you ever been refused as a blood donor?", category: "Previous Deferral"},
                {id: 4, text: "Have you been to the dentist in the past 7 days?", category: "Dental"},
                {id: 5, text: "Have you had a wound or skin infection in the past 2 weeks?", category: "Infections"},
                {id: 6, text: "Have you EVER had any type of cancer?", category: "Cancer"},
                {id: 7, text: "Have you EVER had problems with your heart or lungs?", category: "Medical"},
                {id: 8, text: "Have you ever had a bleeding condition?", category: "Medical"},
                {id: 9, text: "Do you have diabetes?", category: "Medical"},
                {id: 10, text: "For women: Are you pregnant now?", category: "Pregnancy"},
                {id: 11, text: "For women: Have you ever been pregnant?", category: "Pregnancy"},
                {id: 12, text: "Are you currently taking any medications?", category: "Medications"},
                {id: 13, text: "Have you taken medications on the Medication Deferral List?", category: "Medications"},
                {id: 14, text: "Have you had any vaccinations in the past 8 weeks?", category: "Vaccines"},
                {id: 15, text: "Have you had contact with someone vaccinated for smallpox?", category: "Vaccines"},
                {id: 16, text: "Have you donated blood in the past 8 weeks?", category: "Donation History"},
                {id: 17, text: "Have you donated double red cells in the past 16 weeks?", category: "Donation History"},
                {id: 18, text: "Have you EVER had a positive test for Hepatitis B or C?", category: "Hepatitis"},
                {id: 19, text: "Have you had sexual contact with someone with hepatitis (past 6 months)?", category: "Hepatitis"},
                {id: 20, text: "Have you lived with someone with hepatitis (past 6 months)?", category: "Hepatitis"},
                {id: 21, text: "Have you had syphilis or gonorrhea (past 3 months)?", category: "STDs"},
                {id: 22, text: "Have you EVER had a positive HIV test?", category: "HIV"},
                {id: 23, text: "Have you EVER taken HIV treatment medications?", category: "HIV"},
                {id: 24, text: "Have you taken HIV prevention medications (PrEP/PEP)?", category: "HIV"},
                {id: 25, text: "Have you EVER had sexual contact outside of marriage?", category: "Sexual Risk"},
                {id: 26, text: "Have you EVER had same-gender sexual contact?", category: "Sexual Risk"},
                {id: 27, text: "Have you had sexual contact in an undocumented marriage (past 12 months)?", category: "Sexual Risk"},
                {id: 28, text: "Have you had sexual contact with someone HIV+ (past 6 months)?", category: "Sexual Risk"},
                {id: 29, text: "Have you EVER received money/drugs for sex?", category: "Sexual Risk"},
                {id: 30, text: "Have you had sexual contact with someone who received money for sex?", category: "Sexual Risk"},
                {id: 31, text: "Have you EVER used needles for non-prescribed drugs?", category: "Drug Use"},
                {id: 32, text: "Have you had sexual contact with an IV drug user (past 6 months)?", category: "Drug Use"},
                {id: 33, text: "Have you had an accidental needlestick (past 6 months)?", category: "Blood Exposure"},
                {id: 34, text: "Have you had contact with someone's blood (past 6 months)?", category: "Blood Exposure"},
                {id: 35, text: "Have you had a tattoo or cosmetic needles (past 6 months)?", category: "Procedures"},
                {id: 36, text: "Have you had ear/body piercing (past 6 months)?", category: "Procedures"},
                {id: 37, text: "Have you had hijama/wet cupping (past 6 months)?", category: "Procedures"},
                {id: 38, text: "Have you had a blood transfusion (past 6 months)?", category: "Transfusion"},
                {id: 39, text: "Have you had a bone/skin graft (past 6 months)?", category: "Transplant"},
                {id: 40, text: "Have you been incarcerated 72+ hours (past 12 months)?", category: "Incarceration"},
                {id: 41, text: "Have you been outside Saudi Arabia (past 3 years)?", category: "Travel"},
                {id: 42, text: "Have you visited/lived in a malaria area (past 3 years)?", category: "Travel"},
                {id: 43, text: "Have you EVER had malaria?", category: "Infections"},
                {id: 44, text: "Have you EVER had brucellosis?", category: "Infections"},
                {id: 45, text: "Have you consumed raw dairy (past 2 months)?", category: "Infections"},
                {id: 46, text: "Have you had dengue fever (past 4 months)?", category: "Infections"},
                {id: 47, text: "Have you EVER tested positive for Babesia?", category: "Infections"},
                {id: 48, text: "Have you EVER had Chagas disease?", category: "Infections"},
                {id: 49, text: "Have you been to Central/South America?", category: "Travel"},
                {id: 50, text: "Were you or your mother born in Central/South America?", category: "Travel"},
                {id: 51, text: "Have you EVER had brain surgery?", category: "Surgery"},
                {id: 52, text: "Have you had organ/tissue transplant?", category: "Transplant"}
            ];

            // Filter rules based on search and category
            const filteredRules = useMemo(() => {
                return COMPLETE_RULES_DATABASE.filter(rule => {
                    const matchesSearch = searchTerm === '' || 
                        rule.condition.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        rule.keywords.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        rule.category.toLowerCase().includes(searchTerm.toLowerCase());
                    
                    const matchesCategory = selectedCategory === 'All' || rule.category === selectedCategory;
                    
                    return matchesSearch && matchesCategory;
                });
            }, [searchTerm, selectedCategory]);

            // Calculate deferral date
            const calculateDeferralDate = () => {
                const input = calculatorInput.toLowerCase();
                const today = new Date();
                let result = '';

                // Find matching rule
                const matchingRule = COMPLETE_RULES_DATABASE.find(rule => 
                    rule.keywords.split('|').some(keyword => 
                        input.includes(keyword.toLowerCase())
                    )
                );

                if (matchingRule) {
                    if (matchingRule.duration === 'Permanent') {
                        result = 'Permanent deferral - donor cannot donate';
                    } else if (matchingRule.duration === 'None') {
                        result = 'No deferral - donor can donate today';
                    } else {
                        // Parse duration
                        const durationMatch = matchingRule.duration.match(/(\d+)\s*(day|week|month|year)/i);
                        if (durationMatch) {
                            const amount = parseInt(durationMatch[1]);
                            const unit = durationMatch[2].toLowerCase();
                            const returnDate = new Date(today);
                            
                            switch(unit) {
                                case 'day':
                                    returnDate.setDate(today.getDate() + amount);
                                    break;
                                case 'week':
                                    returnDate.setDate(today.getDate() + (amount * 7));
                                    break;
                                case 'month':
                                    returnDate.setMonth(today.getMonth() + amount);
                                    break;
                                case 'year':
                                    returnDate.setFullYear(today.getFullYear() + amount);
                                    break;
                            }
                            
                            result = `Deferral: ${matchingRule.duration}\nCan donate after: ${returnDate.toLocaleDateString()}`;
                        } else {
                            result = `Deferral: ${matchingRule.duration}`;
                        }
                    }
                } else {
                    result = 'No matching deferral rule found. Please check the rules database.';
                }
                
                setCalculatorResult(result);
            };

            // Check eligibility based on answers
            const checkEligibility = () => {
                let deferrals = [];
                
                Object.entries(answers).forEach(([questionId, answer]) => {
                    if (answer === 'yes') {
                        const question = dhqQuestions.find(q => q.id === parseInt(questionId));
                        if (question) {
                            // Find relevant rules for this question
                            const relevantRules = COMPLETE_RULES_DATABASE.filter(rule => 
                                rule.question === `Q${questionId}`
                            );
                            
                            if (relevantRules.length > 0) {
                                relevantRules.forEach(rule => {
                                    if (rule.decision !== 'Accept') {
                                        deferrals.push({
                                            question: question.text,
                                            reason: rule.condition,
                                            duration: rule.duration,
                                            type: rule.decision
                                        });
                                    }
                                });
                            }
                        }
                    }
                });
                
                if (deferrals.length > 0) {
                    // Find the most severe deferral
                    const permanentDeferral = deferrals.find(d => d.type === 'Permanent');
                    if (permanentDeferral) {
                        setDeferralReason(`PERMANENT DEFERRAL: ${permanentDeferral.reason}`);
                    } else {
                        const reasons = deferrals.map(d => `${d.reason} (${d.duration})`).join('; ');
                        setDeferralReason(`TEMPORARY DEFERRAL: ${reasons}`);
                    }
                } else {
                    setDeferralReason('ELIGIBLE TO DONATE');
                }
                
                setShowResults(true);
            };

            return (
                <div className="min-h-screen bg-gray-100">
                    {/* Header */}
                    <header className="bg-red-700 text-white py-6 shadow-lg">
                        <div className="max-w-7xl mx-auto px-4">
                            <h1 className="text-3xl font-bold">🩸 Blood Donor Eligibility Screening System</h1>
                            <p className="text-red-200 mt-2">Saudi Arabian Blood Donation Guidelines • {COMPLETE_RULES_DATABASE.length} Rules</p>
                        </div>
                    </header>

                    {/* Navigation Tabs */}
                    <div className="bg-white shadow-sm sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex space-x-8 py-4">
                                <button
                                    onClick={() => setActiveTab('questionnaire')}
                                    className={`pb-2 px-1 border-b-2 font-medium text-sm ${
                                        activeTab === 'questionnaire' 
                                        ? 'border-red-600 text-red-600' 
                                        : 'border-transparent text-gray-500 hover:text-gray-700'
                                    }`}
                                >
                                    📋 Screening Questionnaire
                                </button>
                                <button
                                    onClick={() => setActiveTab('rules')}
                                    className={`pb-2 px-1 border-b-2 font-medium text-sm ${
                                        activeTab === 'rules' 
                                        ? 'border-red-600 text-red-600' 
                                        : 'border-transparent text-gray-500 hover:text-gray-700'
                                    }`}
                                >
                                    📚 Rules Database
                                </button>
                                <button
                                    onClick={() => setActiveTab('calculator')}
                                    className={`pb-2 px-1 border-b-2 font-medium text-sm ${
                                        activeTab === 'calculator' 
                                        ? 'border-red-600 text-red-600' 
                                        : 'border-transparent text-gray-500 hover:text-gray-700'
                                    }`}
                                >
                                    🗓️ Deferral Calculator
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Questionnaire Tab */}
                        {activeTab === 'questionnaire' && (
                            <div className="space-y-6">
                                {!showResults ? (
                                    <div className="bg-white rounded-lg shadow p-6">
                                        <h2 className="text-2xl font-bold mb-4">Donor History Questionnaire</h2>
                                        <div className="mb-4">
                                            <div className="flex justify-between text-sm text-gray-600 mb-2">
                                                <span>Question {currentQuestion + 1} of {dhqQuestions.length}</span>
                                                <span>{dhqQuestions[currentQuestion].category}</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-2">
                                                <div 
                                                    className="bg-red-600 h-2 rounded-full"
                                                    style={{width: `${((currentQuestion + 1) / dhqQuestions.length) * 100}%`}}
                                                ></div>
                                            </div>
                                        </div>
                                        
                                        <div className="py-8">
                                            <h3 className="text-lg font-medium mb-4">
                                                {dhqQuestions[currentQuestion].text}
                                            </h3>
                                            
                                            <div className="space-y-3">
                                                <button
                                                    onClick={() => {
                                                        setAnswers({...answers, [dhqQuestions[currentQuestion].id]: 'yes'});
                                                        if (currentQuestion < dhqQuestions.length - 1) {
                                                            setCurrentQuestion(currentQuestion + 1);
                                                        } else {
                                                            checkEligibility();
                                                        }
                                                    }}
                                                    className="w-full text-left p-4 border-2 border-gray-300 rounded-lg hover:border-red-500 hover:bg-red-50"
                                                >
                                                    Yes
                                                </button>
                                                <button
                                                    onClick={() => {
                                                        setAnswers({...answers, [dhqQuestions[currentQuestion].id]: 'no'});
                                                        if (currentQuestion < dhqQuestions.length - 1) {
                                                            setCurrentQuestion(currentQuestion + 1);
                                                        } else {
                                                            checkEligibility();
                                                        }
                                                    }}
                                                    className="w-full text-left p-4 border-2 border-gray-300 rounded-lg hover:border-green-500 hover:bg-green-50"
                                                >
                                                    No
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <div className="flex justify-between mt-6">
                                            <button
                                                onClick={() => setCurrentQuestion(Math.max(0, currentQuestion - 1))}
                                                disabled={currentQuestion === 0}
                                                className="px-4 py-2 bg-gray-300 rounded disabled:opacity-50"
                                            >
                                                Previous
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setCurrentQuestion(0);
                                                    setAnswers({});
                                                }}
                                                className="px-4 py-2 bg-gray-500 text-white rounded"
                                            >
                                                Reset
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-lg shadow p-6">
                                        <h2 className="text-2xl font-bold mb-4">Eligibility Results</h2>
                                        <div className={`p-6 rounded-lg ${
                                            deferralReason.includes('ELIGIBLE') 
                                            ? 'bg-green-100 text-green-800'
                                            : deferralReason.includes('PERMANENT')
                                            ? 'bg-red-100 text-red-800'
                                            : 'bg-yellow-100 text-yellow-800'
                                        }`}>
                                            <h3 className="text-xl font-bold mb-2">
                                                {deferralReason.includes('ELIGIBLE') ? '✅ ' : '⚠️ '}
                                                {deferralReason}
                                            </h3>
                                        </div>
                                        
                                        <button
                                            onClick={() => {
                                                setShowResults(false);
                                                setCurrentQuestion(0);
                                                setAnswers({});
                                                setDeferralReason('');
                                            }}
                                            className="mt-6 px-6 py-3 bg-red-600 text-white rounded-lg"
                                        >
                                            Start New Screening
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Rules Database Tab */}
                        {activeTab === 'rules' && (
                            <div className="space-y-6">
                                {/* Search and Filter */}
                                <div className="bg-white rounded-lg shadow p-4">
                                    <div className="flex flex-col md:flex-row gap-4">
                                        <input
                                            type="text"
                                            placeholder="Search rules..."
                                            className="flex-1 p-2 border rounded"
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                        <select
                                            className="p-2 border rounded"
                                            value={selectedCategory}
                                            onChange={(e) => setSelectedCategory(e.target.value)}
                                        >
                                            {categories.map(cat => (
                                                <option key={cat} value={cat}>{cat}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <p className="text-sm text-gray-600 mt-2">
                                        Showing {filteredRules.length} of {COMPLETE_RULES_DATABASE.length} rules
                                    </p>
                                </div>

                                {/* Rules Table */}
                                <div className="bg-white rounded-lg shadow overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="min-w-full">
                                            <thead className="bg-gray-50">
                                                <tr>
                                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
                                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Condition</th>
                                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Decision</th>
                                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Duration</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-200">
                                                {filteredRules.map(rule => (
                                                    <tr key={rule.id} className="hover:bg-gray-50">
                                                        <td className="px-4 py-3 text-sm">{rule.id}</td>
                                                        <td className="px-4 py-3 text-sm">{rule.category}</td>
                                                        <td className="px-4 py-3 text-sm">{rule.condition}</td>
                                                        <td className="px-4 py-3">
                                                            <span className={`deferral-badge ${
                                                                rule.decision === 'Accept' ? 'accept' :
                                                                rule.decision === 'Permanent' ? 'defer-perm' :
                                                                rule.decision.includes('Medical') ? 'defer-conditional' :
                                                                'defer-temp'
                                                            }`}>
                                                                {rule.decision}
                                                            </span>
                                                        </td>
                                                        <td className="px-4 py-3 text-sm">{rule.duration}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Calculator Tab */}
                        {activeTab === 'calculator' && (
                            <div className="bg-white rounded-lg shadow p-6">
                                <h2 className="text-2xl font-bold mb-4">Deferral Date Calculator</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-2">
                                            Enter condition or keyword:
                                        </label>
                                        <input
                                            type="text"
                                            className="w-full p-3 border rounded-lg"
                                            placeholder="e.g., dental implant, tattoo, malaria..."
                                            value={calculatorInput}
                                            onChange={(e) => setCalculatorInput(e.target.value)}
                                        />
                                    </div>
                                    
                                    <button
                                        onClick={calculateDeferralDate}
                                        className="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700"
                                    >
                                        Calculate Return Date
                                    </button>
                                    
                                    {calculatorResult && (
                                        <div className="mt-4 p-4 bg-gray-100 rounded-lg">
                                            <pre className="whitespace-pre-wrap">{calculatorResult}</pre>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-6 mt-12">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <p className="text-gray-400">
                                Blood Donor Eligibility Screening System • Saudi Arabian Guidelines
                            </p>
                            <p className="text-gray-500 text-sm mt-2">
                                Database contains {COMPLETE_RULES_DATABASE.length} rules covering all DHQ questions, medications, vaccines, and conditions
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<BloodDonorScreeningApp />, document.getElementById('root'));
    </script>
</body>
</html>
